<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Used Car Evaluation</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  color: #fff;
}

h1 {
  text-align: center;
  padding: 20px;
}

form {
  max-width: 600px;
  margin: auto;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(12px);
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

label {
  display: block;
  margin-top: 12px;
  font-weight: 600;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
  border: none;
  outline: none;
  transition: 0.3s;
}

input:focus, select:focus {
  transform: scale(1.02);
  box-shadow: 0 0 10px rgba(255,255,255,0.5);
}

button {
  margin-top: 20px;
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #ff7a18;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #ffb347;
  transform: scale(1.05);
}

#result {
  margin-top: 20px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  padding: 15px;
  border-radius: 12px;
  background: rgba(0,0,0,0.3);
  transform: translateY(20px);
  opacity: 0;
  transition: all 0.4s ease;
}

#result.show {
  transform: translateY(0);
  opacity: 1;
}
</style>
</head>

<body>

<h1>🚗 Used Car Evaluation</h1>

<form id="carForm">

<!-- Brand & Model FIRST -->
<label>Brand</label>
<select id="brand" onchange="updateModels()">
  <option value="">Select Brand</option>
  <option value="toyota">Toyota</option>
  <option value="maruti">Maruti</option>
  <option value="honda">Honda</option>
  <option value="hyundai">Hyundai</option>
</select>

<label>Model</label>
<select id="model" onchange="autoFillPrice()">
  <option value="">Select Model</option>
</select>

<label>City</label>
<select id="city">
  <option value="delhi">Delhi</option>
  <option value="mumbai">Mumbai</option>
  <option value="bangalore">Bangalore</option>
  <option value="chandigarh">Chandigarh</option>
</select>

<label>Original Price (₹)</label>
<input type="number" id="price">

<label>Age (years)</label>
<input type="number" id="age">

<label>Mileage (km)</label>
<input type="number" id="mileage">

<label>Owners</label>
<select id="owners">
  <option value="1">1</option>
  <option value="2">2</option>
  <option value="3">3+</option>
</select>

<label>Condition</label>
<select id="condition">
  <option value="excellent">Excellent</option>
  <option value="good">Good</option>
  <option value="fair">Fair</option>
  <option value="poor">Poor</option>
</select>

<label>Fuel</label>
<select id="fuel">
  <option value="petrol">Petrol</option>
  <option value="diesel">Diesel</option>
  <option value="electric">Electric</option>
</select>

<label>Transmission</label>
<select id="transmission">
  <option value="manual">Manual</option>
  <option value="automatic">Automatic</option>
</select>

<button type="button" onclick="evaluateCar()">Evaluate</button>

</form>

<div id="result"></div>

<script>

// Brand → Models
const models = {
  toyota: ["fortuner", "innova", "corolla"],
  maruti: ["swift", "dzire", "baleno"],
  honda: ["city", "civic", "amaze"],
  hyundai: ["creta", "i20", "verna"]
};

// Base Prices (approx on-road)
const basePrices = {
  fortuner: 3500000,
  innova: 2500000,
  swift: 700000,
  dzire: 800000,
  city: 1200000,
  creta: 1400000,
  i20: 900000
};

// City multipliers
const cityFactors = {
  delhi: 1.00,
  mumbai: 1.10,
  bangalore: 1.12,
  chandigarh: 0.98
};

// Model premium
const modelFactors = {
  fortuner: 1.2,
  innova: 1.15,
  creta: 1.1,
  city: 1.08,
  dzire: 1.05
};

function updateModels() {
  let brand = document.getElementById("brand").value;
  let modelSelect = document.getElementById("model");

  modelSelect.innerHTML = "<option value=''>Select Model</option>";

  if (models[brand]) {
    models[brand].forEach(m => {
      let opt = document.createElement("option");
      opt.value = m;
      opt.text = m.toUpperCase();
      modelSelect.add(opt);
    });
  }
}

// Autofill base price
function autoFillPrice() {
  let model = document.getElementById("model").value;
  if (basePrices[model]) {
    document.getElementById("price").value = basePrices[model];
  }
}

// Main valuation
function evaluateCar() {

  let price = parseFloat(document.getElementById("price").value);
  let age = parseInt(document.getElementById("age").value);
  let mileage = parseInt(document.getElementById("mileage").value) || 0;
  let owners = parseInt(document.getElementById("owners").value);
  let condition = document.getElementById("condition").value;
  let fuel = document.getElementById("fuel").value;
  let transmission = document.getElementById("transmission").value;
  let city = document.getElementById("city").value;
  let model = document.getElementById("model").value;

  if (!price || !age) return;

  let value = price;

  // Depreciation
  for (let year = 1; year <= age; year++) {
    if (year === 1) value *= 0.75;
    else if (year <= 3) value *= 0.85;
    else if (year <= 5) value *= 0.90;
    else value *= 0.93;
  }

  // Mileage
  let expected = age * 15000;
  let diff = mileage - expected;
  let mileageFactor = Math.max(0.7, 1 - (diff / 150000));
  value *= mileageFactor;

  // Owners
  value *= owners === 1 ? 1 : owners === 2 ? 0.9 : 0.8;

  // Condition
  const cond = { excellent: 1, good: 0.9, fair: 0.8, poor: 0.7 };
  value *= cond[condition];

  // Market
  const fuelF = { petrol: 1, diesel: 0.9, electric: 1.1 };
  const transF = { manual: 1, automatic: 1.1 };

  value *= fuelF[fuel];
  value *= transF[transmission];

  // Model premium
  if (modelFactors[model]) value *= modelFactors[model];

  // City factor
  value *= cityFactors[city];

  // Floor
  value = Math.max(value, price * 0.1);

  // Range
  let min = value * 0.95;
  let max = value * 1.05;

  let result = document.getElementById("result");
  result.classList.add("show");

  result.innerText =
    `₹${Math.round(min).toLocaleString('en-IN')} - ₹${Math.round(max).toLocaleString('en-IN')}`;

}

</script>

</body>
</html>
