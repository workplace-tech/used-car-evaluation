<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Used Car Evaluation App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background-color: #f4f4f9;
    }
    h1 {
      text-align: center;
      color: #333;
    }
    form {
      max-width: 600px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }
    input, select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    #result {
      margin-top: 20px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      transition: transform 0.3s ease, opacity 0.3s ease;
      opacity: 0;
    }
    #result.show {
      opacity: 1;
      transform: scale(1.1);
    }
    @media (max-width: 600px) {
      body {
        margin: 10px;
      }
      form {
        padding: 15px;
      }
      h1 {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <h1>Used Car Evaluation</h1>
  <form id="carForm">
    <label for="price">Original Price (₹):</label>
    <input type="number" id="price" required>

    <label for="age">Age (years):</label>
    <input type="number" id="age" required>

    <label for="mileage">Mileage (km):</label>
    <input type="number" id="mileage" required>

    <label for="owners">Number of Owners:</label>
    <select id="owners">
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3+</option>
    </select>

    <label for="condition">Condition:</label>
    <select id="condition">
      <option value="excellent">Excellent</option>
      <option value="good">Good</option>
      <option value="fair">Fair</option>
      <option value="poor">Poor</option>
    </select>

    <label for="fuel">Fuel Type:</label>
    <select id="fuel">
      <option value="petrol">Petrol</option>
      <option value="diesel">Diesel</option>
      <option value="electric">Electric</option>
    </select>

    <label for="transmission">Transmission:</label>
    <select id="transmission">
      <option value="manual">Manual</option>
      <option value="automatic">Automatic</option>
    </select>

    <label for="brand">Brand:</label>
    <select id="brand" onchange="updateModels()">
      <option value="">Select Brand</option>
      <option value="toyota">Toyota</option>
      <option value="maruti">Maruti</option>
      <option value="honda">Honda</option>
      <option value="hyundai">Hyundai</option>
    </select>

    <label for="model">Model:</label>
    <select id="model">
      <option value="">Select Model</option>
    </select>
  </form>

  <div id="result"></div>

  <script>
    // Brand → Model cascading dropdown
    function updateModels() {
      let brand = document.getElementById('brand').value;
      let modelSelect = document.getElementById('model');
      modelSelect.innerHTML = "";

      let models = {
        "toyota": ["Corolla", "Innova", "Fortuner"],
        "maruti": ["Swift", "Baleno", "Dzire"],
        "honda": ["City", "Civic", "Amaze"],
        "hyundai": ["i20", "Creta", "Verna"]
      };

      if (models[brand]) {
        models[brand].forEach(m => {
          let opt = document.createElement("option");
          opt.value = m.toLowerCase();
          opt.text = m;
          modelSelect.add(opt);
        });
      } else {
        let opt = document.createElement("option");
        opt.value = "";
        opt.text = "Select Model";
        modelSelect.add(opt);
      }
      evaluateCar(); // auto-update when brand changes
    }

    // Main valuation function
    function evaluateCar() {
      let price = parseFloat(document.getElementById('price').value) || 0;
      let age = parseInt(document.getElementById('age').value) || 0;
      let mileage = parseInt(document.getElementById('mileage').value) || 0;
      let owners = parseInt(document.getElementById('owners').value) || 1;
      let condition = document.getElementById('condition').value;
      let fuel = document.getElementById('fuel').value;
      let transmission = document.getElementById('transmission').value;
      let brand = document.getElementById('brand').value;

      if (!price || !age) return; // wait until essential inputs are filled

      // Step 1: Depreciation
      let depreciationRates = [0.20, 0.15, 0.10];
      let value = price;
      for (let year = 1; year <= age; year++) {
        if (year <= depreciationRates.length) {
          value *= (1 - depreciationRates[year - 1]);
        } else {
          value *= (1 - 0.07);
        }
      }

      // Step 2: Mileage Adjustment
      let expectedMileage = age * 15000;
      let mileageDiff = mileage - expectedMileage;
      if (mileageDiff > 0) {
        value *= (1 - (mileageDiff / 100000));
      }

      // Step 3: Ownership
      let ownershipFactor = owners === 1 ? 1.0 : owners === 2 ? 0.9 : 0.8;
      value *= ownershipFactor;

      // Step 4: Condition
      let conditionFactors = { "excellent": 1.0, "good": 0.9, "fair": 0.8, "poor": 0.7 };
      if (conditionFactors[condition]) value *= conditionFactors[condition];

      // Step 5: Market Demand
      let fuelFactors = { "petrol": 1.0, "diesel": 0.85, "electric": 1.1 };
      let transmissionFactors = { "manual": 1.0, "automatic": 1.1 };
      let brandFactors = { "toyota": 1.05, "maruti": 1.0, "honda": 1.02, "hyundai": 0.95 };

      if (fuelFactors[fuel]) value *= fuelFactors[fuel];
      if (transmissionFactors[transmission]) value *= transmissionFactors[transmission];
      if (brandFactors[brand]) value *= brandFactors[brand];

      // Display result with animation + color coding
      let resultEl = document.getElementById('result');
      resultEl.classList.add('show');
      if (value > price * 0.5) {
        resultEl.style.color = "green";
      } else if (value > price * 0.3) {
        resultEl.style.color = "orange";
      } else {
        resultEl.style.color = "red";
      }
      resultEl.innerText = "Estimated Value: ₹" + Math.round(value).toLocaleString();
    }

    // Real-time updates
    document.querySelectorAll('#carForm input, #carForm select').forEach(el => {
      el.addEventListener('input', evaluateCar);
    });
  </script>
</body>
</html>
